name: Run FPL Vortex Video Pipeline

on:
  workflow_dispatch:
    inputs:
      vortex_mode:
        description: 'Output mode'
        required: false
        default: 'mp4_draft'
        type: choice
        options:
          - slides
          - mp3
          - slide_mp3
          - mp4_draft
          - mp4_final
  # Uncomment to also run on a schedule (cron is in UTC):
  # schedule:
  #   - cron: '0 6 * * 1'   # every Monday at 06:00 UTC

jobs:
  build-video:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # generous ceiling for mp4_final renders; adjust if needed

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium + system deps
        run: |
          python -m playwright install --with-deps chromium

      - name: Verify ffmpeg is available
        run: |
          ffmpeg -version
          ffprobe -version

      - name: Run Vortex pipeline
        env:
          VORTEX_MODE: ${{ github.event.inputs.vortex_mode || 'mp4_draft' }}
          VORTEX_ROOT: ${{ github.workspace }}/Vortex_Final
        run: |
          python main.py

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: vortex-output-${{ github.run_number }}
          path: |
            Vortex_Final/output/**
            Vortex_Final/png/**
            Vortex_Final/player_cards/**
            Vortex_Final/audio/**
          if-no-files-found: warn
          retention-days: 14
